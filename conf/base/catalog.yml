# ===== DATOS CRUDOS =====
consultas_raw:
  type: pandas.CSVDataset
  filepath: data/01_raw/consultas.csv
  load_args:
    encoding: latin-1
    encoding_errors: ignore

examenes_raw:
  type: pandas.CSVDataset
  filepath: data/01_raw/examenes.csv
  load_args:
    encoding: latin-1
    encoding_errors: ignore

medicamentos_raw:
  type: pandas.CSVDataset
  filepath: data/01_raw/medicamentos.csv
  load_args:
    encoding: latin-1
    encoding_errors: ignore

pacientes_raw:
  type: pandas.CSVDataset
  filepath: data/01_raw/pacientes.csv
  load_args:
    encoding: latin-1
    encoding_errors: ignore

